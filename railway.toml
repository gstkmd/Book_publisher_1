[build]
# Global build settings (removed to use per-service settings)

[[services]]
name = "backend"
root = "backend"
[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[[services]]
name = "frontend"
root = "frontend"
[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
startCommand = "npm start"
